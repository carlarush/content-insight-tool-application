spring.application.name=content-insight-tool

# MySQL
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/content_insight?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT — override JWT_SECRET in production with a strong 32+ character value
app.jwt.secret=${JWT_SECRET:content-insight-tool-secret-key-change-me}
app.jwt.expiration-ms=86400000

# Auth
app.auth.password=${AUTH_PASSWORD:changeme}
